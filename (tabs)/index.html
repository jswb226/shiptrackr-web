  html, body, #map { margin:0; padding:0; width:100%; height:100%; background:#080A11; }
  /* Soften the satellite-overlay labels: lower contrast + subtle blur makes
     CARTO&#x27;s bold raster labels read as a quiet annotation instead of
     competing visually with vessel markers. */
  .leaflet-tile-pane .soft-labels {
    filter: contrast(0.55) brightness(1.05) saturate(0.9);
    mix-blend-mode: screen;
  }
  .ship-icon { display:block; transform-origin:center; }
  .ship-icon svg { display:block; }
  .active-ring {
    width:44px; height:44px; border-radius:22px; border:2px dashed #22D3EE;
    position:absolute; top:-10px; left:-10px; pointer-events:none;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0% { transform:scale(0.9); opacity:1; }
    100% { transform:scale(1.3); opacity:0; }

  .leaflet-bar a { background:#121521 !important; color:#22D3EE !important; border-color:#2A2F45 !important; }
  .leaflet-bar a:hover { background:#1A1D2B !important; }
  /* Custom base layer pill switcher (hidden — controlled from React overlay) */
  .base-switch {
    display: none;
    position:absolute; top:10px; right:10px; z-index:1000;
    gap:4px; padding:4px;
    background: rgba(8,10,17,0.75);
    border: 1px solid #2A2F45;
    border-radius: 999px;
    backdrop-filter: blur(6px);
    font-family: -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, sans-serif;
  }
  .base-switch button {
    border: 0; background: transparent;

  }
  .base-switch button.active {

  .marker-cluster {

    display: flex; align-items: center; justify-content: center;
    border-radius: 999px;
    backdrop-filter: blur(1px);
    font-family: -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, sans-serif;
    pointer-events: none;
  }
  .wave-dot span {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.2px;
    text-shadow: 0 0 3px rgba(8,10,17,0.9);
  }

  /* Click-to-query popup for the wave heatmap. Matches app palette. */
  .wave-popup .leaflet-popup-content-wrapper {
    background: rgba(8,10,17,0.92) !important;
    color: #E5E7EB !important;
    border: 1px solid #22D3EE !important;
    border-radius: 12px !important;
    box-shadow: 0 6px 24px rgba(0,0,0,0.5), 0 0 10px rgba(34,211,238,0.25) !important;
    padding: 0 !important;
  }
  .wave-popup .leaflet-popup-content {
    margin: 10px 14px !important;
    font-family: -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, sans-serif !important;
  }
  .wave-popup .leaflet-popup-tip { background: #22D3EE !important; }
  .wave-popup-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: #22D3EE; margin-bottom: 2px;
  }
  .wave-popup-value {
    font-size: 16px; font-weight: 800; color: #FFFFFF; letter-spacing: 0.3px;
  }
  .wave-popup .leaflet-popup-close-button {
    color: #A0A4B8 !important; font-size: 16px !important; padding: 6px 8px 0 0 !important;
  }
&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div id=&quot;map&quot;&gt;&lt;/div&gt;
&lt;script src=&quot;https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
  var SHIP_COLORS = {&quot;cargo&quot;:&quot;#34C759&quot;,&quot;tanker&quot;:&quot;#FF3B30&quot;,&quot;passenger&quot;:&quot;#007AFF&quot;,&quot;fishing&quot;:&quot;#FF9500&quot;,&quot;tug_pilot&quot;:&quot;#22D3EE&quot;,&quot;pleasure&quot;:&quot;#FFFFFF&quot;,&quot;other&quot;:&quot;#A0A4B8&quot;};
  var USE_CLUSTER = true;
  var USE_TRAILS = true;
  var INITIAL_BASE = &quot;satellite&quot;;
  var SHOW_PORTS = true;
  var SHOW_SEAMARKS = true;
  var SHOW_BBOX = false;
  var CLUSTER_MAX_ZOOM = 8; // cluster only when zoomed out; individual markers at zoom &gt; 8
  var TRAIL_MIN_ZOOM = 8;   // show trails only when reasonably zoomed in

  var map = L.map(&#x27;map&#x27;, { zoomControl: true, attributionControl: true, preferCanvas: true, zoomAnimation: true })
    .setView([54.5, -3], 6);

  // ---------- Base layers ----------
  var baseLayers = {};
  // Esri World Imagery — free satellite tiles, no API key required.
  baseLayers.satellite = L.tileLayer(
    &#x27;https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}&#x27;,
    {
      maxZoom: 19,
      attribution: &#x27;Tiles &amp;copy; Esri &amp;mdash; Source: Esri, Maxar, Earthstar Geographics, and the GIS User Community&#x27;
    }
  );
  // Subtle labels overlay for satellite view so countries/seas stay readable.
  // Lowered opacity + CSS filter (className &quot;soft-labels&quot;) softens CARTO&#x27;s
  // raster labels so they read as a quiet annotation rather than competing
  // with the vessel markers.
  var satelliteLabels = L.tileLayer(
    &#x27;https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png&#x27;,
    {
      subdomains: &#x27;abcd&#x27;, maxZoom: 19, opacity: 0.55,
      className: &#x27;soft-labels&#x27;,
      attribution: &#x27;&amp;copy; &lt;a href=&quot;https://carto.com/attributions&quot;&gt;CARTO&lt;/a&gt;&#x27;
    }
  );
  baseLayers.dark = L.tileLayer(&#x27;https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png&#x27;, {
    subdomains: &#x27;abcd&#x27;, maxZoom: 19,
    attribution: &#x27;&amp;copy; &lt;a href=&quot;https://carto.com/attributions&quot;&gt;CARTO&lt;/a&gt; &amp;copy; &lt;a href=&quot;https://openstreetmap.org/copyright&quot;&gt;OSM&lt;/a&gt;&#x27;
  });
  baseLayers.light = L.tileLayer(&#x27;https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png&#x27;, {
    subdomains: &#x27;abcd&#x27;, maxZoom: 19,
    attribution: &#x27;&amp;copy; &lt;a href=&quot;https://carto.com/attributions&quot;&gt;CARTO&lt;/a&gt; &amp;copy; &lt;a href=&quot;https://openstreetmap.org/copyright&quot;&gt;OSM&lt;/a&gt;&#x27;
  });

  var currentBaseKey = INITIAL_BASE;
  if (!baseLayers[currentBaseKey]) currentBaseKey = &#x27;satellite&#x27;;
  baseLayers[currentBaseKey].addTo(map);
  if (currentBaseKey === &#x27;satellite&#x27;) satelliteLabels.addTo(map);

  function switchBase(key) {
    if (!baseLayers[key] || key === currentBaseKey) return;
    map.removeLayer(baseLayers[currentBaseKey]);
    if (currentBaseKey === &#x27;satellite&#x27; &amp;&amp; map.hasLayer(satelliteLabels)) map.removeLayer(satelliteLabels);
    baseLayers[key].addTo(map);
    if (key === &#x27;satellite&#x27;) satelliteLabels.addTo(map);
    baseLayers[key].bringToBack &amp;&amp; baseLayers[key].bringToBack();
    currentBaseKey = key;
    post({ type: &#x27;baseChanged&#x27;, key: key });
  }

  // ---------- Overlays ----------
  var seamarkLayer = null;
  if (SHOW_SEAMARKS) {
    seamarkLayer = L.tileLayer(&#x27;https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png&#x27;, {
      maxZoom: 18,
      minZoom: 7,
      opacity: 0.95,
      attribution: &#x27;Sea marks &amp;copy; &lt;a href=&quot;https://openseamap.org&quot;&gt;OpenSeaMap&lt;/a&gt;&#x27;
    }).addTo(map);
  }

  if (SHOW_BBOX) {
    L.rectangle([[47.5, -28], [68, 13]], {
      color: &#x27;#22D3EE&#x27;, weight: 1, fillOpacity: 0.02, dashArray: &#x27;4 6&#x27;
    }).addTo(map);
  }

  var clusterLayer = (USE_CLUSTER &amp;&amp; typeof L.markerClusterGroup === &#x27;function&#x27;) ? L.markerClusterGroup({
    disableClusteringAtZoom: CLUSTER_MAX_ZOOM + 1,
    spiderfyOnMaxZoom: false,
    showCoverageOnHover: false,
    chunkedLoading: true,
    maxClusterRadius: function(zoom) { return zoom &lt; 5 ? 80 : (zoom &lt; 7 ? 60 : 45); }
  }).addTo(map) : L.layerGroup().addTo(map);
  var trailLayer = L.layerGroup().addTo(map);
  // Ports rendered as individual markers (no clustering) — user preference.
  var portLayer = L.layerGroup();
  if (SHOW_PORTS) portLayer.addTo(map);
  var portMarkers = {}; // id -&gt; marker

  function renderPorts(list) {
    // Clear and re-render (small list, cheap)
    Object.keys(portMarkers).forEach(function(id) {
      portLayer.removeLayer(portMarkers[id]);
      delete portMarkers[id];
    });
    if (!SHOW_PORTS) return;
    var zoom = map.getZoom();
    list.forEach(function(p) {
      var showLabel = (p.size === &#x27;major&#x27; &amp;&amp; zoom &gt;= 6) || (p.size === &#x27;medium&#x27; &amp;&amp; zoom &gt;= 8) || (p.size === &#x27;small&#x27; &amp;&amp; zoom &gt;= 10);
      var hideTiny = p.size === &#x27;small&#x27; &amp;&amp; zoom &lt; 8;
      var hideMedium = p.size === &#x27;medium&#x27; &amp;&amp; zoom &lt; 6;
      if (hideTiny || hideMedium) return;
      var html = &#x27;&lt;div class=&quot;port-icon &#x27; + p.size + &#x27;&quot;&gt;&lt;/div&gt;&#x27; + (showLabel ? &#x27;&lt;div class=&quot;port-label &#x27; + p.size + &#x27;&quot;&gt;&#x27; + p.name + &#x27;&lt;/div&gt;&#x27; : &#x27;&#x27;);
      var size = p.size === &#x27;major&#x27; ? 16 : p.size === &#x27;medium&#x27; ? 12 : 9;
      var icon = L.divIcon({ className: &#x27;&#x27;, html: html, iconSize: [size, size], iconAnchor: [size/2, size/2] });
      var m = L.marker([p.lat, p.lon], { icon: icon, interactive: true, zIndexOffset: 500, bubblingMouseEvents: false });
      m.bindTooltip(&#x27;&lt;b&gt;&#x27; + p.name + &#x27;&lt;/b&gt;&#x27;, { direction: &#x27;top&#x27;, offset: [0, -6], opacity: 0.9, className: &#x27;port-tip&#x27; });
      (function(port){
        m.on(&#x27;click&#x27;, function(e){
          try { if (e &amp;&amp; e.originalEvent) L.DomEvent.stopPropagation(e.originalEvent); } catch(_){}
          post({ type: &#x27;selectPort&#x27;, port: port });
        });
      })(p);
      m.addTo(portLayer);
      portMarkers[p.id] = m;
    });
  }

  function setPortsVisibility(v) {
    SHOW_PORTS = !!v;
    if (SHOW_PORTS &amp;&amp; !map.hasLayer(portLayer)) portLayer.addTo(map);
    if (!SHOW_PORTS &amp;&amp; map.hasLayer(portLayer)) map.removeLayer(portLayer);
    if (window.__lastPorts) renderPorts(window.__lastPorts);
  }

  function setSeamarksVisibility(v) {
    if (v &amp;&amp; !seamarkLayer) {
      seamarkLayer = L.tileLayer(&#x27;https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png&#x27;, {
        maxZoom: 18, minZoom: 7, opacity: 0.95,
        attribution: &#x27;Sea marks &amp;copy; &lt;a href=&quot;https://openseamap.org&quot;&gt;OpenSeaMap&lt;/a&gt;&#x27;
      }).addTo(map);
    } else if (!v &amp;&amp; seamarkLayer) {
      map.removeLayer(seamarkLayer); seamarkLayer = null;
    }
  }

  // Re-render ports on zoom change for adaptive labels
  map.on(&#x27;zoomend&#x27;, function() { if (window.__lastPorts) renderPorts(window.__lastPorts); });

  var markers = {}; // mmsi -&gt; marker
  var trails = {};  // mmsi -&gt; polyline
  var activeMmsi = null;

  
  // Per-type SVG silhouettes (all in a 0 0 20 24 viewBox, bow at top)
  var SHIP_PATHS = {
    cargo:     &#x27;M10 2 L17 8 L16 22 L4 22 L3 8 Z&#x27;,
    tanker:    &#x27;M10 1 L14 6 L14 22 L6 22 L6 6 Z&#x27;,
    passenger: &#x27;M10 1 L16 9 L14 22 L6 22 L4 9 Z&#x27;,
    fishing:   &#x27;M10 3 L13 9 L13 19 L11 21 L9 21 L7 19 L7 9 Z&#x27;,
    tug_pilot: &#x27;M10 3 L15 9 L15 19 L5 19 L5 9 Z&#x27;,
    pleasure:  &#x27;M10 5 L14 18 L10 16 L6 18 Z&#x27;,
    other:     &#x27;M10 1 L18 22 L10 17 L2 22 Z&#x27;
  };
  var TYPE_SIZE = {
    cargo: 1.05, tanker: 1.05, passenger: 1.0, fishing: 0.85,
    tug_pilot: 0.85, pleasure: 0.75, other: 1.0
  };

  // ---------------------------------------------------------------------
  // High-zoom detailed silhouettes — only rendered when extraScale &gt;= 2.0
  // (i.e. map zoom level &gt;= 13). Each takes the type colour and bakes in
  // realistic deck features / superstructure / windows / masts so vessels
  // are instantly recognisable as cargo vs tanker vs passenger etc.
  // Each function returns inner &lt;svg&gt; markup; outer wrapper added by shipSvg.
  // ---------------------------------------------------------------------
  function detailedSvg(color, stroke, type) {
    if (type === &#x27;cargo&#x27;) {
      // Container ship: stacked container blocks + stern bridge superstructure
      return &#x27;&#x27;
        + &#x27;&lt;path d=&quot;M10 1 L17 8 L16 22 L4 22 L3 8 Z&quot; fill=&quot;&#x27; + color + &#x27;&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;1.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&#x27;
        + &#x27;&lt;rect x=&quot;5&quot; y=&quot;11&quot; width=&quot;3&quot; height=&quot;2.4&quot; fill=&quot;#FFFFFF22&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;0.4&quot;/&gt;&#x27;
        + &#x27;&lt;rect x=&quot;9&quot; y=&quot;11&quot; width=&quot;3&quot; height=&quot;2.4&quot; fill=&quot;#FFFFFF22&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;0.4&quot;/&gt;&#x27;
        + &#x27;&lt;rect x=&quot;13&quot; y=&quot;11&quot; width=&quot;2.5&quot; height=&quot;2.4&quot; fill=&quot;#FFFFFF22&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;0.4&quot;/&gt;&#x27;
        + &#x27;&lt;rect x=&quot;5&quot; y=&quot;14&quot; width=&quot;3&quot; height=&quot;2.4&quot; fill=&quot;#FFFFFF22&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;0.4&quot;/&gt;&#x27;
        + &#x27;&lt;rect x=&quot;9&quot; y=&quot;14&quot; width=&quot;3&quot; height=&quot;2.4&quot; fill=&quot;#FFFFFF22&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;0.4&quot;/&gt;&#x27;
        + &#x27;&lt;rect x=&quot;13&quot; y=&quot;14&quot; width=&quot;2.5&quot; height=&quot;2.4&quot; fill=&quot;#FFFFFF22&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;0.4&quot;/&gt;&#x27;
        + &#x27;&lt;rect x=&quot;6.5&quot; y=&quot;18&quot; width=&quot;7&quot; height=&quot;3&quot; fill=&quot;&#x27; + stroke + &#x27;&quot; opacity=&quot;0.55&quot;/&gt;&#x27;;
    }
    if (type === &#x27;tanker&#x27;) {
      // Tanker: pipework manifold deck + aft superstructure
      return &#x27;&#x27;
        + &#x27;&lt;path d=&quot;M10 1 L14 6 L14 22 L6 22 L6 6 Z&quot; fill=&quot;&#x27; + color + &#x27;&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;1.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&#x27;
        + &#x27;&lt;line x1=&quot;10&quot; y1=&quot;7&quot; x2=&quot;10&quot; y2=&quot;20&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;0.6&quot; opacity=&quot;0.6&quot;/&gt;&#x27;
        + &#x27;&lt;circle cx=&quot;10&quot; cy=&quot;9&quot; r=&quot;0.8&quot; fill=&quot;&#x27; + stroke + &#x27;&quot; opacity=&quot;0.5&quot;/&gt;&#x27;
        + &#x27;&lt;circle cx=&quot;10&quot; cy=&quot;13&quot; r=&quot;0.8&quot; fill=&quot;&#x27; + stroke + &#x27;&quot; opacity=&quot;0.5&quot;/&gt;&#x27;
        + &#x27;&lt;circle cx=&quot;10&quot; cy=&quot;17&quot; r=&quot;0.8&quot; fill=&quot;&#x27; + stroke + &#x27;&quot; opacity=&quot;0.5&quot;/&gt;&#x27;
        + &#x27;&lt;rect x=&quot;7.5&quot; y=&quot;19&quot; width=&quot;5&quot; height=&quot;2.5&quot; fill=&quot;&#x27; + stroke + &#x27;&quot; opacity=&quot;0.5&quot;/&gt;&#x27;;
    }
    if (type === &#x27;passenger&#x27;) {
      // Cruise/ferry: rows of porthole windows + tall superstructure
      return &#x27;&#x27;
        + &#x27;&lt;path d=&quot;M10 1 L16 9 L14 22 L6 22 L4 9 Z&quot; fill=&quot;&#x27; + color + &#x27;&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;1.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&#x27;
        + &#x27;&lt;rect x=&quot;5.5&quot; y=&quot;10&quot; width=&quot;9&quot; height=&quot;9&quot; fill=&quot;#FFFFFF1F&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;0.4&quot; rx=&quot;0.5&quot;/&gt;&#x27;
        + &#x27;&lt;line x1=&quot;5.5&quot; y1=&quot;13&quot; x2=&quot;14.5&quot; y2=&quot;13&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;0.3&quot; opacity=&quot;0.7&quot;/&gt;&#x27;
        + &#x27;&lt;line x1=&quot;5.5&quot; y1=&quot;16&quot; x2=&quot;14.5&quot; y2=&quot;16&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;0.3&quot; opacity=&quot;0.7&quot;/&gt;&#x27;
        + &#x27;&lt;rect x=&quot;9&quot; y=&quot;6&quot; width=&quot;2&quot; height=&quot;4&quot; fill=&quot;&#x27; + stroke + &#x27;&quot; opacity=&quot;0.5&quot;/&gt;&#x27;;
    }
    if (type === &#x27;fishing&#x27;) {
      // Fishing trawler: mast w/ rigging, raised wheelhouse
      return &#x27;&#x27;
        + &#x27;&lt;path d=&quot;M10 3 L13 9 L13 19 L11 21 L9 21 L7 19 L7 9 Z&quot; fill=&quot;&#x27; + color + &#x27;&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;1.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&#x27;
        + &#x27;&lt;line x1=&quot;10&quot; y1=&quot;3&quot; x2=&quot;10&quot; y2=&quot;14&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;0.7&quot; opacity=&quot;0.7&quot;/&gt;&#x27;
        + &#x27;&lt;line x1=&quot;8&quot; y1=&quot;6&quot; x2=&quot;12&quot; y2=&quot;6&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;0.5&quot; opacity=&quot;0.6&quot;/&gt;&#x27;
        + &#x27;&lt;rect x=&quot;8&quot; y=&quot;14&quot; width=&quot;4&quot; height=&quot;3&quot; fill=&quot;&#x27; + stroke + &#x27;&quot; opacity=&quot;0.5&quot;/&gt;&#x27;;
    }
    if (type === &#x27;tug_pilot&#x27;) {
      // Tug: short hull, big wheelhouse, stout
      return &#x27;&#x27;
        + &#x27;&lt;path d=&quot;M10 3 L15 9 L15 19 L5 19 L5 9 Z&quot; fill=&quot;&#x27; + color + &#x27;&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;1.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&#x27;
        + &#x27;&lt;rect x=&quot;6.5&quot; y=&quot;11&quot; width=&quot;7&quot; height=&quot;6&quot; fill=&quot;#FFFFFF22&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;0.5&quot;/&gt;&#x27;
        + &#x27;&lt;rect x=&quot;9.5&quot; y=&quot;9&quot; width=&quot;1&quot; height=&quot;2&quot; fill=&quot;&#x27; + stroke + &#x27;&quot; opacity=&quot;0.6&quot;/&gt;&#x27;;
    }
    if (type === &#x27;pleasure&#x27;) {
      // Yacht: deck rails + small cabin
      return &#x27;&#x27;
        + &#x27;&lt;path d=&quot;M10 5 L14 18 L10 16 L6 18 Z&quot; fill=&quot;&#x27; + color + &#x27;&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;1.0&quot; stroke-linejoin=&quot;round&quot;/&gt;&#x27;
        + &#x27;&lt;line x1=&quot;10&quot; y1=&quot;5&quot; x2=&quot;10&quot; y2=&quot;14&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;0.5&quot; opacity=&quot;0.6&quot;/&gt;&#x27;
        + &#x27;&lt;rect x=&quot;8.5&quot; y=&quot;11.5&quot; width=&quot;3&quot; height=&quot;2.5&quot; fill=&quot;#FFFFFF22&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;0.3&quot;/&gt;&#x27;;
    }
    // other / fallback: simple arrow
    return &#x27;&lt;path d=&quot;M10 1 L18 22 L10 17 L2 22 Z&quot; fill=&quot;&#x27; + color + &#x27;&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;1.2&quot; stroke-linejoin=&quot;round&quot;/&gt;&#x27;
      + &#x27;&lt;circle cx=&quot;10&quot; cy=&quot;14&quot; r=&quot;1.4&quot; fill=&quot;&#x27; + stroke + &#x27;&quot; opacity=&quot;0.55&quot;/&gt;&#x27;;
  }

  // Directional arrow-style SVG, rotated by heading.
  // `extraScale` (optional) scales the entire icon by zoom level. When &gt;= 2.0
  // we render the detailed per-type silhouette with deck features.
  function shipSvg(color, heading, active, moored, shipType, extraScale) {
    var rot = heading === null || heading === undefined ? 0 : heading;
    var stroke = active ? &#x27;#22D3EE&#x27; : &#x27;#080A11&#x27;;
    var typeScale = TYPE_SIZE[shipType] || 1.0;
    var z = (extraScale === null || extraScale === undefined) ? 1.0 : extraScale;
    var scale = typeScale * z;
    var size = Math.round((active ? 26 : 18) * scale);
    var h = Math.round(size * 1.2);
    if (moored) {
      var s = Math.max(10, Math.round(size * 0.9));
      return &#x27;&lt;div class=&quot;ship-icon&quot; style=&quot;width:&#x27; + s + &#x27;px; height:&#x27; + s + &#x27;px;&quot;&gt;&#x27; +
        &#x27;&lt;svg viewBox=&quot;0 0 20 20&quot; width=&quot;&#x27; + s + &#x27;&quot; height=&quot;&#x27; + s + &#x27;&quot;&gt;&#x27; +
        &#x27;&lt;circle cx=&quot;10&quot; cy=&quot;10&quot; r=&quot;7&quot; fill=&quot;&#x27; + color + &#x27;&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;1.4&quot; /&gt;&#x27; +
        &#x27;&lt;circle cx=&quot;10&quot; cy=&quot;10&quot; r=&quot;2.2&quot; fill=&quot;&#x27; + stroke + &#x27;&quot; opacity=&quot;0.55&quot; /&gt;&#x27; +
        &#x27;&lt;/svg&gt;&#x27; + (active ? &#x27;&lt;div class=&quot;active-ring&quot;&gt;&lt;/div&gt;&#x27; : &#x27;&#x27;) + &#x27;&lt;/div&gt;&#x27;;
    }
    var detailed = z &gt;= 2.0;
    var inner = detailed
      ? detailedSvg(color, stroke, shipType)
      : &#x27;&lt;path d=&quot;&#x27; + (SHIP_PATHS[shipType] || SHIP_PATHS.other) + &#x27;&quot; fill=&quot;&#x27; + color + &#x27;&quot; stroke=&quot;&#x27; + stroke + &#x27;&quot; stroke-width=&quot;1.3&quot; stroke-linejoin=&quot;round&quot;/&gt;&#x27;
        + &#x27;&lt;circle cx=&quot;10&quot; cy=&quot;14&quot; r=&quot;1.4&quot; fill=&quot;&#x27; + stroke + &#x27;&quot; opacity=&quot;0.55&quot;/&gt;&#x27;;
    return &#x27;&lt;div class=&quot;ship-icon&quot; style=&quot;transform:rotate(&#x27; + rot + &#x27;deg); width:&#x27; + size + &#x27;px; height:&#x27; + h + &#x27;px;&quot;&gt;&#x27; +
      &#x27;&lt;svg viewBox=&quot;0 0 20 24&quot; width=&quot;&#x27; + size + &#x27;&quot; height=&quot;&#x27; + h + &#x27;&quot;&gt;&#x27; +
      inner +
      &#x27;&lt;/svg&gt;&#x27; +
      (active ? &#x27;&lt;div class=&quot;active-ring&quot;&gt;&lt;/div&gt;&#x27; : &#x27;&#x27;) +
      &#x27;&lt;/div&gt;&#x27;;
  }


  function post(msg) {
    var s = JSON.stringify(msg);
    if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(s);
    else if (window.parent &amp;&amp; window.parent !== window) window.parent.postMessage(s, &#x27;*&#x27;);
  }

  // Ensure Leaflet recalculates the iframe&#x27;s true rendered size BEFORE
  // anything reads bounds. Without this, the very first moveend (synchronous
  // after setView) fires while the iframe is still 0×0 in layout, and
  // map.getBounds() returns a degenerate tiny bbox that gets stuck as the
  // viewport filter — leaving the host stuck fetching from a sliver of ocean.
  setTimeout(function() { try { map.invalidateSize(); } catch (e) {} }, 0);
  setTimeout(function() { try { map.invalidateSize(); } catch (e) {} }, 200);

  map.on(&#x27;moveend&#x27;, function() {
    var c = map.getCenter();
    var b = map.getBounds();
    var dLat = b.getNorth() - b.getSouth();
    var dLon = b.getEast() - b.getWest();
    // Skip degenerate bboxes (iframe not yet laid out) — wait for next event.
    if (dLat &lt; 0.05 || dLon &lt; 0.05) return;
    post({
      type: &#x27;moveend&#x27;,
      center: [c.lat, c.lng],
      zoom: map.getZoom(),
      bbox: {
        sw: [b.getSouth(), b.getWest()],
        ne: [b.getNorth(), b.getEast()],
      },
    });
    updateTrailsVisibility();
  });

  // Clicking on bare map: closes active vessel panel AND, if the wave
  // heatmap is visible, drops an &quot;Estimated Wave Height&quot; popup at the tap
  // point (sampled from the nearest grid cell).
  map.on(&#x27;click&#x27;, function(ev) {
    if (activeMmsi) {
      activeMmsi = null;
      if (window.__lastList) renderVessels(window.__lastList);
      post({ type: &#x27;deselect&#x27; });
    }
    if (wavesEnabled &amp;&amp; map.getZoom() &lt;= WAVE_MAX_ZOOM &amp;&amp; ev &amp;&amp; ev.latlng) {
      var sample = nearestWaveSample(ev.latlng);
      if (sample) {
        var html = &#x27;&lt;div class=&quot;wave-popup-inner&quot;&gt;&#x27; +
          &#x27;&lt;div class=&quot;wave-popup-title&quot;&gt;Estimated Wave Height&lt;/div&gt;&#x27; +
          &#x27;&lt;div class=&quot;wave-popup-value&quot;&gt;&#x27; + sample.wave_m.toFixed(1) + &#x27; meters&lt;/div&gt;&#x27; +
          &#x27;&lt;/div&gt;&#x27;;
        L.popup({ className: &#x27;wave-popup&#x27;, closeButton: true, autoPan: false, offset: [0, -4] })
          .setLatLng(ev.latlng)
          .setContent(html)
          .openOn(map);
      }
    }
  });

  function updateTrailsVisibility() {
    var show = USE_TRAILS &amp;&amp; map.getZoom() &gt;= TRAIL_MIN_ZOOM;
    Object.keys(trails).forEach(function(mmsi) {
      var pl = trails[mmsi];
      if (show &amp;&amp; !map.hasLayer(pl)) trailLayer.addLayer(pl);
      else if (!show &amp;&amp; map.hasLayer(pl)) trailLayer.removeLayer(pl);
    });
  }

  // Zoom-based size multiplier for vessel markers. At low zoom we keep the
  // arrow-style markers small for performance and to avoid clutter; at close
  // zoom they grow into proper boat silhouettes that look like real ships.
  function zoomScale() {
    var z = map.getZoom();
    if (z &gt;= 15) return 3.2;     // very close — huge vessel silhouette
    if (z &gt;= 13) return 2.2;     // close-in — clearly boat-shaped
    if (z &gt;= 11) return 1.5;     // moderately zoomed
    return 1.0;                   // default at low zoom
  }

  function renderVessels(list) {
    var seen = {};
    var zScale = zoomScale();
    list.forEach(function(v) {
      if (v.latitude == null || v.longitude == null) return;
      seen[v.mmsi] = true;
      var color = SHIP_COLORS[v.ship_type] || SHIP_COLORS.other;
      // Use heading first; fall back to course. If neither, mark moored.
      var hasDir = v.heading != null || v.course != null;
      var heading = (v.heading != null) ? v.heading : (v.course != null ? v.course : 0);
      var moored = !hasDir || (v.speed != null &amp;&amp; v.speed &lt; 0.3);
      var active = v.mmsi === activeMmsi;
      var html = shipSvg(color, heading, active, moored, v.ship_type, zScale);
      var size = Math.round((active ? 26 : 18) * zScale);
      var icon = L.divIcon({ className: &#x27;&#x27;, html: html, iconSize: [size, size], iconAnchor: [size/2, size/2] });
      if (markers[v.mmsi]) {
        // Smooth movement: tween marker position AND heading rotation from the
        // current state to the newly-reported state over ~3.5s. The trail&#x27;s
        // last vertex (tail) is also dragged along so the past-track stays
        // anchored to the moving vessel. Each marker keeps a single rAF id so
        // a new poll cleanly cancels any in-flight tween.
        var m = markers[v.mmsi];
        var from = m.getLatLng();
        var toLat = v.latitude;
        var toLng = v.longitude;
        var dLat = toLat - from.lat;
        var dLng = toLng - from.lng;
        var dist = Math.sqrt(dLat*dLat + dLng*dLng);
        // Heading shortest-arc delta (handles 350°→10° wrapping cleanly).
        var prevHeading = m._heading != null ? m._heading : heading;
        var arc = ((heading - prevHeading + 540) % 360) - 180;
        m._heading = heading;

        // Always re-set the icon when type/active/moored flag changed (cheap),
        // but immediately patch the rotate transform so we don&#x27;t visually snap.
        m.setIcon(icon);

        if (m._tweenId) { cancelAnimationFrame(m._tweenId); m._tweenId = null; }
        var bigJump = dist &gt; 0.8;
        var tinyMove = dist &lt; 0.00005;
        if (bigJump || (tinyMove &amp;&amp; Math.abs(arc) &lt; 1)) {
          m.setLatLng([toLat, toLng]);
        } else {
          var startLat = from.lat;
          var startLng = from.lng;
          var startHeading = prevHeading;
          var trailRef = trails[v.mmsi];
          // The last point of the existing trail is &quot;where the vessel was&quot;.
          // We update it on every animation frame so the dashed past-track
          // stays glued to the visually animated vessel position.
          var t0 = performance.now();
          var dur = 3500;
          (function tween(now) {
            var t = Math.min(1, (now - t0) / dur);
            var e = t &lt; 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
            var curLat = startLat + dLat * e;
            var curLng = startLng + dLng * e;
            m.setLatLng([curLat, curLng]);
            // Update rotation by reaching into the icon&#x27;s outer wrapper div.
            var iconEl = m._icon &amp;&amp; m._icon.firstChild;
            if (iconEl &amp;&amp; iconEl.style) {
              var curHeading = startHeading + arc * e;
              // Preserve other transform styles (none here) but rewrite rotate.
              iconEl.style.transform = &#x27;rotate(&#x27; + curHeading + &#x27;deg)&#x27;;
            }
            // Drag the last trail point to track the marker.
            if (trailRef &amp;&amp; trailRef._latlngs &amp;&amp; trailRef._latlngs.length) {
              var lls = trailRef.getLatLngs();
              lls[lls.length - 1] = L.latLng(curLat, curLng);
              trailRef.setLatLngs(lls);
            }
            if (t &lt; 1) {
              m._tweenId = requestAnimationFrame(tween);
            } else {
              m._tweenId = null;
            }
          })(t0);
        }
      } else {
        (function(vv) {
          var m = L.marker([vv.latitude, vv.longitude], { icon: icon });
          m.vesselData = vv;
          m.on(&#x27;click&#x27;, function(ev) {
            if (ev &amp;&amp; ev.originalEvent) { ev.originalEvent.stopPropagation(); }
            L.DomEvent.stopPropagation(ev);
            activeMmsi = m.vesselData.mmsi;
            if (window.__lastList) renderVessels(window.__lastList);
            post({ type: &#x27;select&#x27;, mmsi: m.vesselData.mmsi, vessel: m.vesselData });
          });
          clusterLayer.addLayer(m);
          markers[vv.mmsi] = m;
        })(v);
      }
      markers[v.mmsi].vesselData = v;

      // Render trail polyline if points available
      if (USE_TRAILS &amp;&amp; v.track &amp;&amp; v.track.length &gt;= 2) {
        if (trails[v.mmsi]) {
          trails[v.mmsi].setLatLngs(v.track);
          trails[v.mmsi].setStyle({ color: color });
        } else {
          var pl = L.polyline(v.track, {
            color: color,
            weight: 1.5,
            opacity: 0.55,
            dashArray: &#x27;2 4&#x27;,
            smoothFactor: 1.5,
            interactive: false,
          });
          trails[v.mmsi] = pl;
          if (map.getZoom() &gt;= TRAIL_MIN_ZOOM) trailLayer.addLayer(pl);
        }
      }
    });
    // Remove stale markers and trails
    Object.keys(markers).forEach(function(mmsi) {
      if (!seen[mmsi]) {
        clusterLayer.removeLayer(markers[mmsi]);
        delete markers[mmsi];
      }
    });
    Object.keys(trails).forEach(function(mmsi) {
      if (!seen[mmsi]) {
        trailLayer.removeLayer(trails[mmsi]);
        delete trails[mmsi];
      }
    });
    window.__lastList = list;
  }

  // Static track polyline (used on ship detail screen)
  var staticTrack = null;
  function setStaticTrack(points, color) {
    if (staticTrack) { map.removeLayer(staticTrack); staticTrack = null; }
    if (!points || points.length &lt; 2) return;
    staticTrack = L.polyline(points, {
      color: color || &#x27;#22D3EE&#x27;,
      weight: 2.5,
      opacity: 0.8,
      smoothFactor: 1.5,
    }).addTo(map);
  }

  // Playback ghost marker + partial polyline (scrubbing past positions)
  var playbackLine = null;
  var playbackMarker = null;
  function setPlayback(points, idx, color) {
    clearPlayback();
    if (!points || points.length &lt; 2) return;
    var clampedIdx = Math.max(0, Math.min(idx, points.length - 1));
    var partial = points.slice(0, clampedIdx + 1);
    var col = color || &#x27;#22D3EE&#x27;;
    if (partial.length &gt;= 2) {
      playbackLine = L.polyline(partial, {
        color: col, weight: 3, opacity: 0.95, smoothFactor: 1.2,
      }).addTo(map);
    }
    var p = points[clampedIdx];
    var html = &#x27;&lt;div class=&quot;ship-icon&quot; style=&quot;width:24px; height:29px;&quot;&gt;&#x27; +
      &#x27;&lt;svg viewBox=&quot;0 0 20 24&quot; width=&quot;24&quot; height=&quot;29&quot;&gt;&#x27; +
      &#x27;&lt;path d=&quot;M10 1 L18 22 L10 17 L2 22 Z&quot; &#x27; +
      &#x27;fill=&quot;&#x27; + col + &#x27;&quot; stroke=&quot;#22D3EE&quot; stroke-width=&quot;2&quot; stroke-linejoin=&quot;round&quot;/&gt;&#x27; +
      &#x27;&lt;circle cx=&quot;10&quot; cy=&quot;13&quot; r=&quot;2&quot; fill=&quot;#22D3EE&quot;/&gt;&#x27; +
      &#x27;&lt;/svg&gt;&lt;div class=&quot;active-ring&quot;&gt;&lt;/div&gt;&lt;/div&gt;&#x27;;
    var icon = L.divIcon({ className: &#x27;&#x27;, html: html, iconSize: [24, 29], iconAnchor: [12, 14] });
    playbackMarker = L.marker(p, { icon: icon, zIndexOffset: 1000, interactive: false }).addTo(map);
  }
  function clearPlayback() {
    if (playbackLine) { map.removeLayer(playbackLine); playbackLine = null; }
    if (playbackMarker) { map.removeLayer(playbackMarker); playbackMarker = null; }
  }

  // Dead-reckoning forecast — dashed line + end-marker showing predicted position.
  var forecastLine = null;
  var forecastMarker = null;
  var forecastLabel = null;
  function setForecast(from, to, label) {
    clearForecast();
    if (!from || !to) return;
    forecastLine = L.polyline([from, to], {
      color: &#x27;#22D3EE&#x27;, weight: 2.5, opacity: 0.85,
      dashArray: &#x27;6,8&#x27;, lineCap: &#x27;round&#x27;, lineJoin: &#x27;round&#x27;, interactive: false,
    }).addTo(map);
    // End marker: small cyan crosshair circle.
    var pulseHtml = &#x27;&lt;div class=&quot;ship-icon&quot; style=&quot;width:22px; height:22px;&quot;&gt;&#x27; +
      &#x27;&lt;svg viewBox=&quot;0 0 22 22&quot; width=&quot;22&quot; height=&quot;22&quot;&gt;&#x27; +
      &#x27;&lt;circle cx=&quot;11&quot; cy=&quot;11&quot; r=&quot;7&quot; fill=&quot;rgba(34,211,238,0.15)&quot; stroke=&quot;#22D3EE&quot; stroke-width=&quot;1.8&quot; stroke-dasharray=&quot;3,2&quot;/&gt;&#x27; +
      &#x27;&lt;circle cx=&quot;11&quot; cy=&quot;11&quot; r=&quot;2.2&quot; fill=&quot;#22D3EE&quot;/&gt;&#x27; +
      &#x27;&lt;/svg&gt;&lt;/div&gt;&#x27;;
    var icon = L.divIcon({ className: &#x27;&#x27;, html: pulseHtml, iconSize: [22, 22], iconAnchor: [11, 11] });
    forecastMarker = L.marker(to, { icon: icon, zIndexOffset: 900, interactive: false }).addTo(map);
    if (label) {
      forecastLabel = L.tooltip({
        permanent: true, direction: &#x27;top&#x27;, offset: [0, -8], opacity: 0.95, className: &#x27;forecast-tip&#x27;
      }).setLatLng(to).setContent(label).addTo(map);
    }
  }
  function clearForecast() {
    if (forecastLine) { map.removeLayer(forecastLine); forecastLine = null; }
    if (forecastMarker) { map.removeLayer(forecastMarker); forecastMarker = null; }
    if (forecastLabel) { map.removeLayer(forecastLabel); forecastLabel = null; }
  }

  // Wind overlay — per-point barb/arrow renderer. Cyan→amber→red colour scale
  // by speed. Arrow rotated toward where the wind is blowing TO.
  var windLayer = L.layerGroup();
  function clearWind() { windLayer.clearLayers(); if (map.hasLayer(windLayer)) map.removeLayer(windLayer); }
  function windColor(kn) {
    if (kn &lt; 10)  return &#x27;#22D3EE&#x27;;
    if (kn &lt; 18)  return &#x27;#A7F3D0&#x27;;
    if (kn &lt; 25)  return &#x27;#FBBF24&#x27;;
    return &#x27;#F87171&#x27;;
  }
  function renderWind(points) {
    clearWind();
    if (!points || !points.length) return;
    for (var i = 0; i &lt; points.length; i++) {
      var p = points[i];
      var col = windColor(p.wind_kn);
      var size = Math.round(18 + Math.min(14, p.wind_kn));
      var rot = (p.wind_dir + 180) % 360; // meteorological FROM → render TO
      // Barbed-arrow SVG: shaft with triangular head.
      var html = &#x27;&lt;div class=&quot;wind-icon&quot; style=&quot;transform:rotate(&#x27; + rot + &#x27;deg); width:&#x27; + size + &#x27;px; height:&#x27; + size + &#x27;px;&quot;&gt;&#x27; +
        &#x27;&lt;svg viewBox=&quot;0 0 20 20&quot; width=&quot;&#x27; + size + &#x27;&quot; height=&quot;&#x27; + size + &#x27;&quot;&gt;&#x27; +
        &#x27;&lt;line x1=&quot;10&quot; y1=&quot;17&quot; x2=&quot;10&quot; y2=&quot;6&quot; stroke=&quot;&#x27; + col + &#x27;&quot; stroke-width=&quot;1.8&quot; stroke-linecap=&quot;round&quot;/&gt;&#x27; +
        &#x27;&lt;polygon points=&quot;10,2 6.5,8 13.5,8&quot; fill=&quot;&#x27; + col + &#x27;&quot; stroke=&quot;&#x27; + col + &#x27;&quot; stroke-width=&quot;0.4&quot;/&gt;&#x27; +
        &#x27;&lt;/svg&gt;&lt;/div&gt;&#x27;;
      var icon = L.divIcon({ className: &#x27;&#x27;, html: html, iconSize: [size, size], iconAnchor: [size/2, size/2] });
      var m = L.marker([p.lat, p.lon], { icon: icon, interactive: false, keyboard: false, zIndexOffset: -400 });
      m.addTo(windLayer);
    }
    windLayer.addTo(map);
  }

  // Sea-state overlay — smooth colour-graded HEATMAP using Leaflet.heat.
  //
  // Rendering rules (per user spec):
  //   • Colour scale ramps Blue → Green → Orange → Red as wave height rises
  //   • Smooth blended gradient (not discrete dots / numbers)
  //   • Only drawn at zoom ≤ 8; hidden automatically when user zooms in
  //   • Tapping the ocean opens an &quot;Estimated Wave Height: X.X meters&quot; popup
  //     (queried from nearest grid sample; only while layer is active)
  //
  // Wave heights are normalised against WAVE_MAX_M (8 m ≈ storm seas) so the
  // gradient saturates at dangerous conditions but spans the full colour range
  // across ordinary 0–4 m seas that dominate most of the viewport.
  var WAVE_MAX_ZOOM = 8;   // heatmap only when zoomed out to ocean scale
  var WAVE_MAX_M    = 8.0; // normalisation ceiling for heatmap intensity
  var waveHeatLayer = null;
  var wavePoints = [];     // latest cached samples [{lat, lon, wave_m}]
  var wavesEnabled = false;

  function waveGradient() {
    // Keys are normalised intensity 0..1 (wave_m / WAVE_MAX_M).
    return {
      0.00: &#x27;#3B82F6&#x27;,  // Blue — calm
      0.35: &#x27;#10B981&#x27;,  // Green — slight
      0.65: &#x27;#F97316&#x27;,  // Orange — moderate / rough
      1.00: &#x27;#EF4444&#x27;   // Red — dangerous
    };
  }

  function buildHeatData() {
    var out = [];
    for (var i = 0; i &lt; wavePoints.length; i++) {
      var p = wavePoints[i];
      if (!p || p.wave_m == null || p.wave_m &lt;= 0) continue; // skip inland cells
      var intensity = Math.max(0.05, Math.min(1, p.wave_m / WAVE_MAX_M));
      out.push([p.lat, p.lon, intensity]);
    }
    return out;
  }

  function clearWaveHeat() {
    if (waveHeatLayer) { map.removeLayer(waveHeatLayer); waveHeatLayer = null; }
  }

  function renderWaveHeat() {
    clearWaveHeat();
    if (!wavesEnabled) return;
    if (map.getZoom() &gt; WAVE_MAX_ZOOM) return;   // hide when zoomed in
    if (typeof L.heatLayer !== &#x27;function&#x27;) return; // plugin missing — soft fail
    var data = buildHeatData();
    if (!data.length) return;
    waveHeatLayer = L.heatLayer(data, {
      radius: 70,
      blur: 55,
      minOpacity: 0.45,
      maxZoom: WAVE_MAX_ZOOM,
      max: 1.0,
      gradient: waveGradient()
    }).addTo(map);
  }

  // Expose same names the host expects.
  function renderWaves(points) {
    wavesEnabled = true;
    wavePoints = Array.isArray(points) ? points.slice() : [];
    renderWaveHeat();
  }
  function clearWaves() {
    wavesEnabled = false;
    wavePoints = [];
    clearWaveHeat();
  }

  // Re-render on zoom change so the heatmap disappears past zoom 8 and
  // reappears instantly on zoom-out — no flash/blink.
  map.on(&#x27;zoomend&#x27;, function() {
    if (wavesEnabled) renderWaveHeat();
    // Re-scale vessel markers based on the new zoom level.
    if (window.__lastList) renderVessels(window.__lastList);
  });

  // Nearest-sample lookup for the click-to-query tooltip. Uses squared-
  // degree distance — good enough for a coarse 3x3 / 6x6 grid.
  function nearestWaveSample(latlng) {
    if (!wavePoints.length) return null;
    var best = null, bestD = Infinity;
    for (var i = 0; i &lt; wavePoints.length; i++) {
      var p = wavePoints[i];
      if (!p || p.wave_m == null || p.wave_m &lt;= 0) continue;
      var dLat = p.lat - latlng.lat;
      var dLon = p.lon - latlng.lng;
      var d = dLat*dLat + dLon*dLon;
      if (d &lt; bestD) { bestD = d; best = p; }
    }
    // Cap lookup radius at ~4° so clicks far from any sample don&#x27;t pop up.
    if (!best || Math.sqrt(bestD) &gt; 4.0) return null;
    return best;
  }

  function setActive(mmsi) {
    activeMmsi = mmsi;
    if (window.__lastList) renderVessels(window.__lastList);
  }

  function focusOn(lat, lng, zoom) {
    map.flyTo([lat, lng], zoom || 10, { duration: 1.2 });
  }

  function handleMsg(data) {
    if (data.type === &#x27;vessels&#x27;) renderVessels(data.vessels);
    else if (data.type === &#x27;setActive&#x27;) setActive(data.mmsi);
    else if (data.type === &#x27;focus&#x27;) focusOn(data.lat, data.lng, data.zoom);
    else if (data.type === &#x27;track&#x27;) setStaticTrack(data.points, data.color);
    else if (data.type === &#x27;ports&#x27;) { window.__lastPorts = data.ports; renderPorts(data.ports); }
    else if (data.type === &#x27;setPortsVisible&#x27;) setPortsVisibility(!!data.visible);
    else if (data.type === &#x27;setSeamarksVisible&#x27;) setSeamarksVisibility(!!data.visible);
    else if (data.type === &#x27;setBase&#x27;) switchBase(data.key);
    else if (data.type === &#x27;playback&#x27;) setPlayback(data.points, data.idx, data.color);
    else if (data.type === &#x27;playback_clear&#x27;) clearPlayback();
    else if (data.type === &#x27;forecast&#x27;) setForecast(data.from, data.to, data.label);
    else if (data.type === &#x27;clearForecast&#x27;) clearForecast();
    else if (data.type === &#x27;wind&#x27;) renderWind(data.points);
    else if (data.type === &#x27;clearWind&#x27;) clearWind();
    else if (data.type === &#x27;waves&#x27;) renderWaves(data.points);
    else if (data.type === &#x27;clearWaves&#x27;) clearWaves();
  }

  window.addEventListener(&#x27;message&#x27;, function(e) {
    try { handleMsg(JSON.parse(e.data)); } catch(err) {}
  });
  document.addEventListener(&#x27;message&#x27;, function(e) {
    try { handleMsg(JSON.parse(e.data)); } catch(err) {}
  });

  post({ type: &#x27;ready&#x27; });
